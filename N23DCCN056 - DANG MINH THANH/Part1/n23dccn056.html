<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài tập tương tác</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="m-0 font-sans bg-white">

    <header class="bg-blue-700 text-white">
        <div class="max-w-6xl mx-auto flex items-center justify-between px-4 py-3">
            <h1 class="text-lg font-bold">MySite</h1>

            <!-- Menu Desktop -->
            <nav class="hidden md:flex gap-6 text-sm">
                <a href="#" class="hover:text-gray-200">Home</a>
                <a href="#" class="hover:text-gray-200">About</a>
                <a href="#" class="hover:text-gray-200">Contact</a>
            </nav>


            <button class="md:hidden text-2xl hover:text-gray-200">
                ☰
            </button>
        </div>
    </header>


    <main class="max-w-6xl mx-auto px-6 py-16">
        <section class="flex flex-col md:flex-row items-center justify-center gap-12">


            <div class="w-40 md:w-52">
                <img src="https://upload.wikimedia.org/wikipedia/commons/d/d5/Tailwind_CSS_Logo.svg"
                    alt="Tailwind CSS Logo" class="w-full" />
            </div>


            <div class="text-center md:text-left">
                <h2 class="text-4xl md:text-5xl font-bold text-gray-800 mb-6">
                    Tailwind CSS
                </h2>
                <h3 class="text-2xl font-semibold text-gray-800 mb-2">
                    Learn Tailwind CSS
                </h3>
                <p class="text-gray-500 mb-5">
                    Build responsive layouts quickly with utility-first CSS.
                </p>
                <button class="bg-blue-700 text-white px-5 py-2 rounded hover:bg-blue-800 transition">
                    Get Started
                </button>
            </div>

        </section>
    </main>

</body>

</html>
